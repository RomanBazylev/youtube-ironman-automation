name: Generate and Publish Video

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      video_type:
        description: "short or normal"
        required: false
        default: ""
      count:
        description: "Number of videos to generate"
        required: false
        default: "1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: llama-3.3-70b-versatile
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4o-mini
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          COUNT="${{ github.event.inputs.count }}"
          TYPE="${{ github.event.inputs.video_type }}"
          if [ -z "$COUNT" ]; then COUNT=1; fi
          if [ -z "$TYPE" ]; then
            python pipeline/generate_video.py --count "$COUNT"
          else
            python pipeline/generate_video.py --video-type "$TYPE" --count "$COUNT"
          fi
