name: Generate and Publish Video

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      video_type:
        description: "auto, short or normal"
        required: false
        default: "auto"
      count:
        description: "Number of videos to generate"
        required: false
        default: "1"
      privacy_status:
        description: "public, private or unlisted"
        required: false
        default: "public"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: llama-3.3-70b-versatile
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4o-mini
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight secrets check
        run: |
          set -e
          REQUIRED_VARS=(
            YOUTUBE_CLIENT_ID
            YOUTUBE_CLIENT_SECRET
            YOUTUBE_REFRESH_TOKEN
          )

          MISSING=0
          for VAR_NAME in "${REQUIRED_VARS[@]}"; do
            if [ -z "${!VAR_NAME}" ]; then
              echo "[ERROR] Missing required secret: ${VAR_NAME}"
              MISSING=1
            fi
          done

          if [ "$MISSING" -ne 0 ]; then
            echo "[FATAL] Required secrets are missing. Add them in GitHub Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          if [ -z "$GROQ_API_KEY" ] && [ -z "$OPENAI_API_KEY" ]; then
            echo "[FATAL] Configure at least one LLM key: GROQ_API_KEY or OPENAI_API_KEY"
            exit 1
          fi

          if [ -z "$PEXELS_API_KEY" ] && [ -z "$PIXABAY_API_KEY" ]; then
            echo "[FATAL] Configure at least one stock API key: PEXELS_API_KEY or PIXABAY_API_KEY"
            exit 1
          fi

          echo "[OK] Required secrets are configured."

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          COUNT="${{ github.event.inputs.count }}"
          TYPE="${{ github.event.inputs.video_type }}"
          PRIVACY="${{ github.event.inputs.privacy_status }}"
          if [ -z "$COUNT" ]; then COUNT=1; fi
          if [ -z "$TYPE" ]; then TYPE=auto; fi
          if [ -z "$PRIVACY" ]; then PRIVACY=public; fi
          python -m pipeline.generate_video --video-type "$TYPE" --count "$COUNT" --privacy-status "$PRIVACY"
